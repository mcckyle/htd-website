<style>
/* ===============================================
   HIGHWAY TO DESTINY - DONOR WALL STYLES.
   Designed specifically to sit on top of the existing
   solid brand green (#47ad32) outer page background color.
================================================== */
.donor-wall
{
  --green-glass: rgba(255, 255, 255, 0.075);
  --green-glass-hover: rgba(255, 255, 255, 0.13);
  --border: rgba(255, 255, 255, 0.14);
  --text: rgba(255, 255, 255, 0.96);
  --soft: rgba(255, 255, 255, 0.72);

  position: relative;
  overflow: hidden;
  isolation: isolate;

  padding: clamp(5rem, 8vw, 8rem) 1.25rem;

  /* IMPORTANT:
     The outer page is already #47ad32.
     This creates a premium layered panel effect instead
     of stacking more aggressive greens. */
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(0, 0, 0, 0.12));
}

/* Ambient Background Styles. */
.donor-atmosphere
{
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(
    circle at 50% -10%,
    rgba(255, 255, 255, 0.18),
    transparent 45%
  ),
  radial-gradient(
    circle at 10% 90%,
    rgba(255, 255, 255, 0.08),
    transparent 35%
  );
  z-index: -1;
}
.donor-wall::after
{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.035;
  background-image: radial-gradient(rgba(255, 255, 255, 0.8), transparent 0.6px);
  background-size: 26px 26px;
}
.donor-container
{
  position: relative;
  z-index: 1;

  width: 100%;
  max-width: 1240px;
  margin: auto;
}
.donor-header
{
  max-width: 760px;
  margin: auto;
  text-align: center;
}
.donor-eyebrow
{
  display: inline-flex;

  padding: 0.55rem 1rem;
  margin-bottom: 1.25rem;

  border: 1px solid var(--border);
  border-radius: 999px;

  background: rgba(255, 255, 255, 0.08);
  color: white;
  backdrop-filter: blur(18px);

  font-size: 0.7rem;
  font-weight: 750;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.donor-title
{
  margin: 0;
  color: white;

  font-size: clamp(3.5rem, 8vw, 6.5rem);
  font-weight: 850;
  line-height: 0.9;
  letter-spacing: -0.075em;
}
.donor-subtitle
{
  margin: 1.5rem auto 0;
  max-width: 680px;

  font-size: 1.05rem;
  line-height: 1.85;
  text-wrap: balance;
  color: var(--soft);
}
.donor-rule
{
  width: min(100%, 960px);
  height: 1px;
  margin: clamp(3rem, 6vw, 5rem) auto;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.22), transparent);
}
.donor-grid
{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1rem;
}
.donor-card
{
  position: relative;
  overflow: hidden;

  display: flex;
  align-items: center;
  justify-content: center;

  padding: 1.25rem;
  min-height: 88px;

  border: 1px solid var(--border);
  border-radius: 26px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.055));
  backdrop-filter: blur(20px);
  color: var(--text);
  box-shadow: 0 20px 45px rgba(0, 0, 0, 0.12), inset 0 1px rgba(255, 255, 255, 0.12);

  font-size: 0.98rem;
  font-weight: 650;
  letter-spacing: 0.01em;
  text-align: center;

  opacity: 0;

  transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;

  animation: donorReveal 0.65s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  animation-delay: calc(var(--i) * 25ms);
}
.donor-card::before
{
  /* Soft Glass Sheen Styles. */
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    120deg,
    rgba(255, 255, 255, 0.14),
    transparent 35%
  );
  pointer-events: none;
}
.donor-card:hover { transform: translateY(-4px); background: var(--green-glass-hover); border-color: rgba(255, 255, 255, 0.28); }

@keyframes donorReveal
{
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce)
{
  .donor-card { opacity: 1; animation: none; }
  .donor-card:hover { transform: none; }
}
@media (max-width: 700px)
{
  .donor-wall { padding-inline: 1rem; }
  .donor-grid { grid-template-columns: 1fr; }
  .donor-card { min-height: 78px; border-radius: 22px; }
}
