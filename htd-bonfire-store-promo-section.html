<script>
  //Entrance animation when the section scrolls into view.
  const merchSection = document.querySelector(".merch-hero");

  if (merchSection)
  {
    const merchObserver = new IntersectionObserver((entries, observer) =>
    {
      entries.forEach((entry) =>
      {
        if (entry.isIntersecting)
        {
          merchSection.classList.add("visible");
          observer.unobserve(entry.target);
        }
      });
    },
    {
      threshold: 0.2
    });

    merchObserver.observe(merchSection);
  }

</script>
