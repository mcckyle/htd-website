<style>
/* Partners Section Wrapper Styles. */
.partners-section
{
  position: relative;
  overflow: hidden;
  padding: 110px 24px;

  background: radial-gradient(
    circle at top,
    rgba(255, 255, 255, 0.06),
    transparent 38%
  ),
  linear-gradient(180deg, #1b1f1b 0%, #232823 100%);
  isolation: isolate;
}
.partners-section::before /* Ambient Lighting Styles. */
{
  content: "";
  position: absolute;
  top: -240px;
  left: 50%;

  width: 720px;
  height: 720px;

  background: radial-gradient(
    circle,
    rgba(71, 173, 50, 0.22),
    transparent 68%
  );
  filter: blur(70px);
  opacity: 0.9;
  pointer-events: none;
  z-index: -1;
}
.partners-section::after /* Subtle Grain Styles. */
{
  content: "";
  position: absolute;
  inset: 0;

  background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
  linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);

  background-size: 80px 80px;

  mask-image: radial-gradient(circle at center, black, transparent 90%);
  opacity: 0.22;
  pointer-events: none;
}
.partners-shell { position: relative; z-index: 1; width: 100%; max-width: 1280px; margin: 0 auto; }
.partners-header { max-width: 760px; margin: 0 auto 72px; text-align: center; }
.partners-eyebrow
{
  margin: 0 0 18px;
  color: #9ae58a;

  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

/* Title Styles. */
.partners-title
{
  margin: 0;
  color: #ffffff;

  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700;
  line-height: 1.04;
  letter-spacing: -0.045em;
}

/* Accent Underline Styles. */
.partners-title::after
{
  content: "";
  display: block;
  width: 72px;
  height: 4px;
  margin: 24px auto 0;

  border-radius: 999px;
  background: linear-gradient(90deg, #47ad32, #7be368);
  box-shadow: 0 0 24px rgba(71, 173, 50, 0.38);
}

/* Intro Text Styles. */
.partners-intro
{
  margin: 28px auto 0;
  max-width: 680px;

  font-size: 1.08rem;
  line-height: 1.85;
  color: #c9d2c6;
}

/* Partners Grid Styles. */
.partners-grid
{
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 22px;
}

/* Partner Card Styles. */
.partner
{
  position: relative;

  display: flex;
  align-items: center;
  justify-content: center;

  min-height: 136px;
  padding: 28px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(245, 248, 245, 0.92) 100%);
  border: 1px solid rgba(255, 255, 255, 0.32);
  backdrop-filter: blur(14px);

  overflow: hidden;
  text-decoration: none;
  box-shadow: 0 10px 34px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.7);

  opacity: 0;
  transform: translateY(18px);

  transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease, background 0.35s ease;
}
.partner-visible { opacity: 1; transform: translateY(0); }
.partner::before /* Glow Layer Styles. */
{
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(
    circle at top,
    rgba(71, 173, 50, 0.18),
    transparent 70%
  );
  opacity: 0;

  transition: opacity 0.35s ease;
}
/* Partner Logo Styles. */
.partner img
{
  position: relative;
  z-index: 1;
  max-width: 150px;
  max-height: 76px;
  object-fit: contain;

  filter: grayscale(100%) contrast(0.92);
  opacity: 0.72;

  transition: transform 0.35s ease, filter 0.35s ease, opacity 0.35s ease;
}
.partner:hover, .partner:focus-visible
{
  transform: translateY(-8px);
  border-color: rgba(71, 173, 50, 0.28);
  background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(249, 251, 249, 0.98) 100%);
  box-shadow: 0 20px 48px rgba(0, 0, 0, 0.24),
              0 0 0 1px rgba(71, 173, 50, 0.14),
              0 0 30px rgba(71, 173, 50, 0.18);
}
.partner:hover::befoore, .partner:focus-visible::before { opacity: 1; }
.partner:hover img, .partner:focus-visible img
{
opacity: 1;
  filter: grayscale(0%) contrast(1);
  transform: scale(1.045);
}

/* Media Query Styles. */
@media (max-width: 768px)
{
  .partners-section { padding: 88px 18px; }
  .partners-header { margin-bottom: 52px; }
  .partners-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; }
  .partner { min-height: 116px; border-radius: 20px; padding: 22px; }
  .partner img { max-width: 128px; max-height: 64px; }
}

@media (prefers-reduced-motion: reduce)
{
  .partner, .partner::before, .partner img { transition: none !important; }
}
</style>

<script>
//Animate fade-in for a polished look.
document.addEventListener("DOMContentLoaded", () => {
  const partners = document.querySelectorAll(".partner");

  const observer = new IntersectionObserver((entries) =>
  {
      entries.forEach((entry, index) =>
      {
        if (entry.isIntersecting)
        {
          entry.target.classList.add("partner-visible");
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

  partners.forEach((partner, index) =>
  {
    partner.style.transitionDelay = `${index * 35}ms`;
    observer.observe(partner);
  });
});
</script>
