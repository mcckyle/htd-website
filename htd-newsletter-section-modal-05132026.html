<!-- HTD Website Newsletter Section. Designed by Kyle McColgan. May 2026. -->
<section class="newsletter-section" aria-label="newsletter-title">
  <div class="newsletter-container">
    <div class="newsletter-content">
      <p class="newsletter-eyebrow">Highway to Destiny Newsletter</p>
      <h2 id="newsletter-title" class="newsletter-title">April 2026 Community Update</h2>
      <p class="newsletter-description">
        Explore the latest stories, outreach efforts, community impact,
        upcoming opportunities, and organizational updates from Highway to
        Destiny.
      </p>

      <div class="newsletter-actions">
        <a
          class="newsletter-button primary"
          href="https://img1.wsimg.com/isteam/ip/38135061-0104-48da-961f-1edb89f4655f/HTD-FIXEDPAGE2.png/:/rs=h:175,m"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open Full Newsletter
        </a>
        <a
          class="newsletter-button secondary"
          href="https://img1.wsimg.com/isteam/ip/38135061-0104-48da-961f-1edb89f4655f/HTD-FIXEDPAGE2.png/:/rs=h:175,m"
          download
        >
          Download PNG
        </a>
    </div>
  </div>

  <div class="newsletter-preview-wrapper">
    <button
      class="newsletter-preview-button"
      type="button"
      aria-label="Expand newsletter preview"
    >
      <div class="newsletter-preview-glow"></div>

      <img
        src="https://img1.wsimg.com/isteam/ip/38135061-0104-48da-961f-1edb89f4655f/HTD-FIXEDPAGE2.png/:/rs=h:175,m"
        alt="Highway to Destiny April 2026 Newsletter"
        class="newsletter-preview"
        loading="lazy"
      />

      <div class="newsletter-preview-overlay">
        <span>Click to Expand</span>
      </div>
    </button>
  </div>
</div>

<!-- Modal. -->
<dialog class="newsletter-modal" id="newsletterModal">
  <button
    class="newsletter-modal-close"
    type="button"
    aria-label="Close newsletter preview"
  >
    ×
  </button>

  <img
    src="https://img1.wsimg.com/isteam/ip/38135061-0104-48da-961f-1edb89f4655f/HTD-FIXEDPAGE2.png/:/rs=h:175,m"
    alt="Expanded April 2026 Newsletter"
    class="newsletter-modal-image"
  />
</dialog>
</section>

<style>
.newsletter-section
{
  position: relative;
  padding: clamp(5rem, 10vw, 8rem) 1.5rem;
  overflow: hidden;
  background: radial-gradient(
    circle at top left,
    rgba(71, 173, 50, 0.16),
    transparent 42%
  ),
  linear-gradient(180deg, #ffffff 0%, #f6faf4 100%);
}
.newsletter-container
{
  width: min(1200px, 100%);
  margin: 0 auto;

  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  align-items: center;

  gap: clamp(2rem, 5vw, 5rem);
}
.newsletter-content { position: relative; z-index: 2; }
.newsletter-eyebrow
{
  margin-bottom: 1rem;
  color: #47ad32;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.newsletter-title
{
  margin: 0;
  color: #111827;
  font-size: clamp(2.6rem, 5vw, 4.5rem);
  line-height: 0.95;
  letter-spacing: -0.05em;
}
.newsletter-description
{
  max-width: 560px;
  margin-top: 1.75rem;
  color: #4b5563;
  font-size: 1.08rem;
  line-height: 1.9;
}

.newsletter-actions
{
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  margin-top: 2.5rem;
}
.newsletter-button
{
  display: inline-flex;
  align-items: center;
  justify-content: center;

  min-height: 56px;
  padding: 0 1.8rem;
  border-radius: 999px;
  font-weight: 700;
  text-decoration: none;

  transition: transform 180ms ease,
              background-color 180ms ease,
              border-color 180ms ease,
              color 180ms ease,
              box-shadow 180ms ease,
}
.newsletter-button:hover { transform: translateY(-2px); }
.newsletter-button.primary
{
  background: #47ad32;
  color: #ffffff;
  box-shadow: 0 20px 45px rgba(71, 173, 50, 0.28);
}
.newsletter-button.primary:hover { background: #3d992b; }
.newsletter-button.secondary
{
  border: 1px solid rgba(17, 24, 39, 0.12);
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: blur(12px);
  color: #111827;
}

.newsletter-preview-wrapper
{
  position: relative;
  display: flex;
  justify-content: center;
}
.newsletter-preview-button
{
  position: relative;
  border: none;
  background: transparent;
  cursor: pointer;
  padding: 0;
}
.newsletter-preview-glow
{
  position: absolute;
  inset: 10%;
  border-radius: 2rem;
  background: radial-gradient(
    circle,
    rgba(71, 173, 50, 0.32),
    transparent 70%
  );
  filter: blur(60px);
  z-index: 0;
}
.newsletter-preview
{
  position: relative;
  z-index: 2;

  width: min(100%, 430px);
  height: 450px;

  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 2rem;

  box-shadow: 0 30px 80px rgba(15, 23, 42, 0.16),
              0 10px 30px rgba(71, 173, 50, 0.12);

  transition: transform 240ms ease, box-shadow 240ms ease;
}
.newsletter-preview-button:hover .newsletter-preview
{
  transform: translateY(-6px) scale(1.015);
  box-shadow: 0 40px 100px rgba(15, 23, 42, 0.22),
              0 14px 40px rgba(71, 173, 50, 0.16);
}
.newsletter-preview-overlay
{
  position: absolute;
  inset: 0;
  z-index: 3;

  display: flex;
  align-items: flex-end;
  justify-content: center;

  padding-bottom: 1.5rem;
  border-radius: 2rem;
  background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.62) 100%);
  opacity: 0;

  transition: opacity 180ms ease;
}
.newsletter-preview-button:hover .newsletter-preview-overlay { opacity: 1; }
.newsletter-preview-overlay span
{
  color: #ffffff;
  font-size: 0.92rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.newsletter-modal
{
  width: min(92vw, 760px);
  padding: 1rem;
  border: none;
  border-radius: 2rem;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 30px 100px rgba(0, 0, 0, 0.35);
}
.newsletter-modal::backdrop
{
  background: rgba(15, 23, 42, 0.78);
  backdrop-filter: blur(10px);
}
.newsletter-modal-image { width: 100%; height: auto; border-radius: 1.5rem; }
.newsletter-modal-close
{
  position: absolute;
  top: 1rem;
  right: 1rem;

  width: 48px;
  height: 48px;

  border: none;
  border-radius: 50%;

  background: rgba(17, 24, 39, 0.9);
  color: #ffffff;
  font-size: 1.5rem;
  cursor: pointer;
}

@media (max-width: 900px)
{
  .newsletter-container { grid-template-columns: 1fr; }
  .newsletter-content { text-align: center; }
  .newsletter-description { margin-inline: auto; }
  .newsletter-actions { justify-content: center; }
  .newsletter-title { line-height: 1; }
}
</style>

<script>
const newsletterModal = document.getElementById("newsletterModal");
const previewButton = document.querySelector(".newsletter-preview-button");
const closeButton = document.querySelector(".newsletter-modal-close");

previewButton.addEventListener("click", () =>
{
  newsletterModal.showModal();
});
closeButton.addEventListener("click", () =>
{
  newsletterModal.close();
});
newsletterModal.addEventListener("click", (event) =>
{
  const rect = newsletterModal.getBoundingClientRect();

  const clickedInside =
    rect.top <= event.clientY &&
    event.clientY <= rect.top + rect.height &&
    rect.left <= event.clientX &&
    event.clientX <= rect.left + rect.width;

  if (!clickedInside)
  {
    newsletterModal.close();
  }
});
</script>
