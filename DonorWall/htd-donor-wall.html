<style>
/* ===============================================
   HIGHWAY TO DESTINY - DONOR WALL STYLES.
   Designed specifically to sit on top of the existing
   solid brand green (#47ad32) outer page background color.
================================================== */
.donor-wall
{
  --green-glass: rgba(255, 255, 255, 0.075);
  --green-glass-hover: rgba(255, 255, 255, 0.13);
  --border: rgba(255, 255, 255, 0.14);
  --text: rgba(255, 255, 255, 0.96);

  --white: rgba(255, 255, 255, 0.96);
  --soft: rgba(255, 255, 255, 0.70);
  --line: rgba(255, 255, 255, 0.14);

  position: relative;
  isolation: isolate;
  overflow: hidden;
  padding: clamp(6rem, 9vw, 9rem) clamp(1.5rem, 4vw, 2rem);

  /* IMPORTANT:
     The outer page is already #47ad32.
     This creates a premium layered panel effect instead
     of stacking more aggressive greens. */
  background: radial-gradient(circle at top, rgba(255, 255, 255, 0.16), transparent 38%),
              radial-gradient(circle at bottom, rgba(255, 255, 255, 0.08), transparent 55%),
              linear-gradient(180deg, #56be42, #47ad32);
}

/* Donor Wall Ambient Layer Styles. */
.donor-glow
{
  position: absolute;
  width: 700px;
  height: 700px;
  left: 50%;
  top: -420px;
  transform: translateX(-50%);
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(
    circle,
    rgba(255, 255, 255, 0.16),
    transparent 65%
  );
  filter: blur(20px);
  z-index: -1;
}
.donor-wall::after
{
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: 0.035;
  background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0, rgba(255, 255, 255, 0.03) 1px, transparent 1px, transparent 12px);
  background-size: 32px 32px;
}
.donor-container
{

  width: 100%;

}
.donor-header

.donor-eyebrow

}
.donor-title

  letter-spacing: -0.06em;
}
.donor-subtitle
{
  margin: 1.6rem auto 0;
  max-width: 700px;

  font-size: 1.05rem;
  line-height: 1.9;
  text-wrap: balance;
  color: var(--soft);
}
.donor-card
{
  position: relative;
  min-height: 120px;

  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;

  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.09);
  backdrop-filter: blur(10px);
  color: white;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.10), inset 0 1px rgba(255, 255, 255, 0.22);

  font-size: 1.03rem;
  font-weight: 600;
  letter-spacing: 0.015em;
  line-height: 1.55;
  text-align: center;

  opacity: 0;
  transform: translateY(18px);

  transition: transform 0.35s, box-shadow 0.35s, border-color 0.35s;

  animation: donorEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  animation-delay: calc(var(--i) * 18ms);
}
.donor-card::before
{
  /* Subtle Top Highlight Styles. */
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.30), transparent 35%);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
}
.donor-card::after
{
  /* Glass Sheen Styles. */
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    180deg,
    rgba(255, 255, 255, 0.08),
    transparent 45%
  );
}
.donor-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.28); box-shadow: 0 26px 60px rgba(0, 0, 0, 0.18); }
.donor-card:hover::after { background: radial-gradient(circle at top, rgba(255, 255, 255, 0.12), transparent 65%); }
.donor-grid
{
  margin-top: clamp(4rem, 8vw, 7rem);
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 2rem;
  opacity: 0;

  animation: donorGridReveal 0.5s ease forwards;
}
.donor-meta
{
  margin: 3rem auto 0;
  text-align: center;
  color: rgba(255, 255, 255, 0.65);
  font-size: 0.90rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.donor-divider
{
  width: 140px;
  height: 1px;
  margin: 3.5rem auto;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
}
@keyframes donorEnter
{
  from { opacity: 0; transform: translateY(24px) scale(0.98); filter: blur(6px); }
  to { opacity: 1; transform: none; filter: none; }
}
@keyframes donorGridReveal
{
  to { opacity: 1; }
}

@media (prefers-reduced-motion: reduce)
{
  .donor-card { opacity: 1; transform: none; animation: none; }
  .donor-card:hover { transform: none; }
}
@media (max-width: 700px)
{
  .donor-wall { padding-inline: 1rem; }
  .donor-grid { grid-template-columns: 1fr; }
  .donor-card { min-height: 82px; border-radius: 24px; }
}
