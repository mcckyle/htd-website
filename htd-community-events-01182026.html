<style>
  /* Page Container Styles. */
  #newsEventsPage {
    width: 100%;
    padding: 80px 24px;
    background: #000; /* Color: Black.  */
    color: #fff; /* Color: White. */
    box-sizing: border-box;
    text-align: center;
  }

  /* Page Title Styles. */
  #newsEventsPage h1 {
    font-size: 2.6rem;
    color: #47ad32; /* Color: Brand green */
    margin-bottom: 12px;
  }

  /* Intro Text Styles. */
  .events-intro {
    max-width: 760px;
    margin: 0 auto 56px;
    font-size: 1.1rem;
    line-height: 1.7;
    color: #dcdcdc;
  }

  /* Events Grid Styles. */
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Individual Event Card Styles. */
  .event-card {
    background: #0f0f0f;
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 32px 28px;

    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  /* Card Hover Effect Styles. */
  .event-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 24px rgba(50, 168, 82, 0.35);
  }

  /* Event Cards Title Styles. */
  .event-card h2 {
    font-size: 1.4rem;
    color: #47ad32; /* Color: Brand green */
    margin-bottom: 12px;
  }

  /* Event Card Description Styles. */
  .event-card p {
    font-size: 1rem;
    line-height: 1.6;
    color: #e5e5e5;
    margin-bottom: 24px;
  }

  /* Event Card Links Button Styles. */
  .event-card a {
    font-size: 0.95rem;
    font-weight: 600;
    color: #47ad32; /* Color: Brand green */
    text-decoration: none;
    border-bottom: 2px solid transparent;

    transition: border-color 0.2s ease, color 0.2s ease;
  }

  /* Event Cards Hover Link Effects Styles. */
  .event-card a:hover {
    border-color: #47ad32; /* Color: Brand green */
    color: #6fe3a1;
  }

  /* Media Query Styles. */
  @media (max-width: 768px) {
    #newsEventsPage h1 { font-size: 2.1rem; }
    .events-intro { font-size: 1rem; margin-bottom: 44px; }
  }
</style>

<div id="newsEventsPage">
  <h1>News & Events</h1>
  <p className="events-intro">
    Stay connected with trusted community partners hosting events, outreach,
    and resources that support our unhoused neighbors across Saint Louis.
  </p>
  <div className="events-grid">

    <div class="event-card">
      <h2>Street Patrol STL</h2>
      <p>
        Outreach calendars and weekly efforts delivering direct resources and community care to those in need.
      </p>
      <a href="https://streetpatrolstl.org/calendar" target="_blank" rel="noopener">
        View Calendar →
      </a>
    </div>
  </div>
</div>
